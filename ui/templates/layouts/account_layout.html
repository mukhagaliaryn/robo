{% extends 'layouts/learner_layout.html' %}
{% load static %}

{% block learner_layout %}
<div class="grid md:flex items-start gap-8 py-6 px-4">
    <ul class="max-w-64 w-full hidden md:grid gap-1">
        <li>
            <a 
                href="{% url 'learner:account' %}" 
                class="py-2 px-4 w-full block rounded-full font-medium {% if request.path == '/learner/account/me/' %}bg-brand hover:bg-brand text-neutral-secondary{% else %}hover:bg-neutral-secondary{% endif %}"
            >
                Аккаунт
            </a>
        </li>
        <li>
            <a 
                href="{% url 'learner:settings' %}" 
                class="py-2 px-4 w-full block rounded-full font-medium {% if request.path == '/learner/account/settings/' %}bg-brand hover:bg-brand text-neutral-secondary{% else %}hover:bg-neutral-secondary{% endif %}"
            >
                Баптаулар
            </a>
        </li>
    </ul>

    <ul class="flex md:hidden w-full font-medium text-center">
        <li class="whitespace-nowrap">
            <a href="{% url 'learner:account' %}" class="p-2 border-b-4 {% if request.path == '/learner/account/me/' %}border-b-4 border-brand{% else %}border-transparent{% endif %}">
                Аккаунт
            </a>
        </li>
        <li>
            <a href="{% url 'learner:settings' %}" class="p-2 border-b-4 {% if request.path == '/learner/account/settings/' %}border-b-4 border-brand{% else %}border-transparent{% endif %}">
                Баптаулар
            </a>
        </li>
    </ul>

    <div class="flex-1">
        {% block account_layout %}
        {% endblock account_layout %}
    </div>
</div>
{% endblock learner_layout %}
