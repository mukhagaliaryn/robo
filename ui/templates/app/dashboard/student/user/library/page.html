{% extends "layouts/learner_layout.html" %}

{% block title %}{{ user_book.book.title }}{% endblock title %}

{% block learner_layout %}
<div class="max-w-screen-xl mx-auto px-4 py-8 grid gap-4">
    <div class="flex flex-wrap items-center justify-between gap-3">
        <div class="grid">
            <h1 class="text-2xl font-black">{{ user_book.book.title }}</h1>
            <p class="text-muted">PDF оқу режимі</p>
        </div>

        <div class="flex gap-2">
            <a 
                href="{% url 'student:library' %}" 
                class="flex justify-center items-center text-muted bg-white border border-border-200 hover:bg-secondary-50 hover:text-foreground active:scale-95 focus:ring-4 focus:ring-secondary-200 shadow-xs font-medium leading-5 rounded-full text-sm px-4 py-2.5 focus:outline-none"
            >
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-chevron-left-icon lucide-chevron-left">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                <span>Кітапхана</span>
            </a>

            <form method="post" action="{% url 'student:book_toggle' book.id %}">
                {% csrf_token %}
                <button class="text-white bg-red-600 hover:bg-red-700 box-border border border-transparent active:scale-95 focus:ring-4 focus:ring-red-300 shadow-xs font-medium leading-5 rounded-full px-4 py-2.5 focus:outline-none">
                    Кітапханадан алу
                </button>
            </form>
        </div>
    </div>

    <div class="rounded-2xl border border-border-200 bg-white overflow-hidden" style="height: 75vh;">
        <iframe
            src="{{ user_book.book.file.url }}"
            class="w-full h-full block"
            style="border:0;"
        ></iframe>
    </div>

    <div class="text-muted">
        Егер PDF көрінбесе, файлды жүктеп аш:
        <a class="text-primary-500 font-medium hover:underline" href="{{ book.file.url }}" target="_blank" rel="noopener">PDF ашу</a>
    </div>

</div>
{% endblock learner_layout %}
