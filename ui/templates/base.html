{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}{% endblock %} - Robo-Baldyrgan</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="shortcut icon" href="{% static 'images/icon.svg' %}" type="image/x-icon">
    {% tailwind_css %}

    <!-- CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
</head>

<body class="font-inter text-body leading-normal tracking-normal text-sm">
    {% if messages %}
        {% for message in messages %}
            <div
				class="message-item fixed z-50 bottom-0 left-0 w-full bg-black flex justify-center items-center gap-2 px-4 py-2 text-white transition-all duration-500" 
				role="alert"
			>
				<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
					class="lucide lucide-circle-alert-icon lucide-circle-alert {{ message.tags }}">
					<circle cx="12" cy="12" r="10" />
					<line x1="12" x2="12" y1="8" y2="12" />
					<line x1="12" x2="12.01" y1="16" y2="16" />
				</svg>
                <span class="font-medium">
                    {{ message }}
                </span>
            </div>

			<script>
				setTimeout(() => {
					const messages = document.querySelectorAll('.message-item');
					messages.forEach((msg) => {
						msg.classList.add('translate-y-10', 'opacity-0');
						setTimeout(() => msg.remove(), 1000);
					});
				}, 5000);
			</script>
        {% endfor %}
    {% endif %}

    {% block base %}
    {% endblock base %}
    <style>
        html { scroll-behavior: smooth; }

        [data-reveal]{
            opacity: 0;
            transform: translateY(14px);
            transition: opacity .6s ease, transform .6s ease;
            will-change: opacity, transform;
        }
        [data-reveal].is-visible{
            opacity: 1;
            transform: translateY(0);
        }
    </style>


    <!-- CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.8.11/dist/dotlottie-wc.js" type="module"></script>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    
    <script>
        (function () {
            const els = document.querySelectorAll("[data-reveal]");
            if (!els.length) return;

            const io = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (!entry.isIntersecting) return;

                    const el = entry.target;
                    const delay = parseInt(el.getAttribute("data-reveal-delay") || "0", 10);
                    if (delay) el.style.transitionDelay = delay + "ms";

                    el.classList.add("is-visible");
                    io.unobserve(el); // once
                });
            }, {
                threshold: 0.12,
                rootMargin: "0px 0px -10% 0px"
            });

            els.forEach(el => io.observe(el));
        })();
    </script>
    {% block script %}{% endblock script %}
</body>
</html>
